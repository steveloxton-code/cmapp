server {
    listen 80;
    server_name _;   # Replace _ with your server's hostname or IP if you want to be explicit

    # Serve the built React app from dist/
    root /opt/itil-app/dist;
    index index.html;

    # Proxy /api/* to the Node API
    location /api/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Client-side routing — all unmatched paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block access to source files if accidentally present
    location ~ /\.(git|env) {
        deny all;
    }
}
